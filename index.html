<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baddie’s World</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
    color: white;
    text-align: center;
}

/* Header */
header {
    padding: 40px 20px;
}

.profile {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #ff4da6;
}

h1 {
    margin: 10px 0 5px;
}

.bio {
    opacity: 0.8;
    font-size: 14px;
}

/* Links */
.links {
    margin-top: 30px;
}

.link-btn {
    display: block;
    width: 80%;
    max-width: 320px;
    margin: 12px auto;
    padding: 14px;
    border-radius: 30px;
    background: #ff4da6;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.link-btn:hover {
    background: white;
    color: #ff4da6;
}

/* Gallery */
.gallery {
    margin-top: 40px;
}

.gallery img {
    width: 90%;
    max-width: 300px;
    border-radius: 15px;
    margin: 10px;
}

/* Footer */
footer {
    margin: 40px 0 20px;
    font-size: 12px;
    opacity: 0.6;
}
</style>

</head>

<body>

<header>
    <img src="https://via.placeholder.com/150" class="profile">
    <h1>Baddie 💖</h1>
    <p class="bio">Aesthetic | Anime | Pinterest Vibes ✨</p>
</header>

<div class="links">
    <a href="#" class="link-btn">🌸 Pinterest</a>
    <a href="#" class="link-btn">📸 Instagram</a>
    <a href="#" class="link-btn">🎥 YouTube</a>
    <a href="#" class="link-btn">🛍 My Collection</a>
</div>

<div class="gallery">
    <h2>My Vibes ✨</h2>
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
</div>

<footer>
    Made with 💖 by Baddie
</footer>

</body>
</html>
